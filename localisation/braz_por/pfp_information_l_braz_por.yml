#Decision Description Localization
l_braz_por:
	pfp_category:0 "Pipe's Formable Puppets"
	pfp_category_desc:0 "À medida que conquistamos mais território, administrá-lo se tornou um problema complicado. Para resolver isso, governos fantoches leais à nossa nação devem ser estabelecidos nas regiões que conquistamos. Isso nos permitirá concentrar nossa atenção em outro lugar, enquanto a região apoia nossa causa."

	pfp_puppet_management:0 "Pipe's Formable Puppets - Gerenciamento"
	pfp_puppet_management_desc:0 "Após estabelecer nossa ocupação militar, pode ser necessário fazer ajustes em relação à administração e seus territórios."
	pfp_management_option_enabled:0 "Ativado"
	pfp_management_option_disabled:0 "Desativado"

	pfp_management_window:0 "Abrir menu de gerenciamento"
	pfp_management_use_overlord_color:0 "Alternar fantoches com a cor do soberano"
	pfp_management_use_overlord_color_tooltip:0 "Todos os países controlados pelo jogador estão em paz."

	pfp_management_resistance:0 "Alternar Mecânicas de Resistência"
	pfp_management_resistance_desc:0 "Esta decisão ativa ou desativa as mecânicas de resistência. Se ativada, os fantoches formáveis não obterão territórios centrais e terão que completar focos e decisões para aumentar a conformidade e reduzir a resistência. Um estado se tornará território central quando a conformidade superar 80% e a resistência estiver abaixo de 20%."

	pfp_puppet_integration_core_state:0 "Anexar Território Pacificado"
	pfp_puppet_integration_core_state_desc:0 "O que foi tomado pela força foi mantido tempo suficiente para se tornar algo mais. A resistência foi quebrada, a população foi remodelada, e a terra produz em nosso nome. Não há mais razão para manter a ilusão de uma administração separada. Estes territórios serão formalmente absorvidos pelo estado — não como terra ocupada, mas como solo natal. O que era deles é agora, e sempre foi, nosso."
	pfp_puppet_integration_core_state_trigger_tooltip:0 "[pfp_puppet_core_resistance_status]"
	pfp_puppet_core_status_resistance_enabled:0 "Todos os seguintes devem ser verdadeiros:\n      Controla completamente qualquer território central possível.\n      Qualquer território central possível não é central de §Y[ROOT.GetName]§!.\n      Qualquer território central possível tem mais de 80% de conformidade.\n      Qualquer território central possível tem menos de 20% de resistência."
	pfp_puppet_core_status_resistance_disabled:0 "Todos os seguintes devem ser verdadeiros:\n      Controla completamente qualquer território central possível.\n      Qualquer território central possível não é central de §Y[ROOT.GetName]§!."
	pfp_puppet_integration_core_state_effect_tooltip:0 "Qualquer território central possível que atenda aos requisitos anteriores será declarado central."

