	pfp_puppet_resistance_idea_5_desc:0 "被占領者は自分たちが誰であったかを忘れていない。通りで、野原で、閉ざされた扉の後ろでの静かな会話の中で — 反抗が息づいている。それは簡単には崩れず、静かには崩れない。"

	pfp_military_police_idea_1:0 "憲兵"
	pfp_military_police_idea_1_desc:0 "占領は兵士だけでは勝てない。すべての駐屯地の背後には執行者のネットワークが立つ — 戦場ではなく、街角、検問所、真夜中のドアへのノックのために訓練された男たち。被占領者への我々の掌握が強まるにつれ、彼らの効率も高まる。彼らは土地を学び、人々を学び、残存する抵抗が決して足場を見つけないようにする。"
	
	pfp_military_police_idea_2:0 "憲兵"
	pfp_military_police_idea_2_desc:0 "占領は兵士だけでは勝てない。すべての駐屯地の背後には執行者のネットワークが立つ — 戦場ではなく、街角、検問所、真夜中のドアへのノックのために訓練された男たち。被占領者への我々の掌握が強まるにつれ、彼らの効率も高まる。彼らは土地を学び、人々を学び、残存する抵抗が決して足場を見つけないようにする。"
	
	pfp_military_police_idea_3:0 "憲兵"
	pfp_military_police_idea_3_desc:0 "占領は兵士だけでは勝てない。すべての駐屯地の背後には執行者のネットワークが立つ — 戦場ではなく、街角、検問所、真夜中のドアへのノックのために訓練された男たち。被占領者への我々の掌握が強まるにつれ、彼らの効率も高まる。彼らは土地を学び、人々を学び、残存する抵抗が決して足場を見つけないようにする。"

	pfp_civilian_collaborators_idea_1:0 "民間協力者"
	pfp_civilian_collaborators_idea_1_desc:0 "占領への抵抗のすべてが兵士やパルチザンからくるわけではない。多くは普通の人々 — 目をそらす隣人、メッセージを伝える店主、望まない客を匿う家族 — の中に生きている。しかし人々は転向させることができる。誘惑を通じて、恐怖を通じて、古い忠誠心のゆっくりとした侵食を通じて、被占領者の中のいくつかは占領者に仕え始める。彼らは見る。彼らは報告する。そして月が経つごとに、抵抗の炎は息をする場所がより少なくなっていく。"

	pfp_civilian_collaborators_idea_2:0 "民間協力者"
	pfp_civilian_collaborators_idea_2_desc:0 "占領への抵抗のすべてが兵士やパルチザンからくるわけではない。多くは普通の人々 — 目をそらす隣人、メッセージを伝える店主、望まない客を匿う家族 — の中に生きている。しかし人々は転向させることができる。誘惑を通じて、恐怖を通じて、古い忠誠心のゆっくりとした侵食を通じて、被占領者の中のいくつかは占領者に仕え始める。彼らは見る。彼らは報告する。そして月が経つごとに、抵抗の炎は息をする場所がより少なくなっていく。"

	pfp_civilian_collaborators_idea_3:0 "民間協力者"
	pfp_civilian_collaborators_idea_3_desc:0 "占領への抵抗のすべてが兵士やパルチザンからくるわけではない。多くは普通の人々 — 目をそらす隣人、メッセージを伝える店主、望まない客を匿う家族 — の中に生きている。しかし人々は転向させることができる。誘惑を通じて、恐怖を通じて、古い忠誠心のゆっくりとした侵食を通じて、被占領者の中のいくつかは占領者に仕え始める。彼らは見る。彼らは報告する。そして月が経つごとに、抵抗の炎は息をする場所がより少なくなっていく。"

	pfp_puppet_integration:0 "被占領者の統合"
	pfp_puppet_integration_desc:0 "占領は、特定の地域がもはや異質に感じられなくなるほど長く続いてきた。人々は平定され、旧来の慣習は忘れられ、国家の機構は我々の名のもとに動いている。これらの土地を征服された地として扱うのをやめ、本当にそうであるもの — 我々のもの — として扱う時だ。"

	pfp_puppet_assistance:0 "パイプの形成可能な傀儡 — 傀儡支援"
	pfp_puppet_assistance_desc:0 "傀儡国家はそれを握る手と同じくらい強い。支援なしでは、最も従順な政権でさえ、その占領された人口の重みで屈服するだろう。それは許さない。人力と物資の安定した流れを通じて、この地域への我々の投資が保護されたままであること — そして抵抗のコストが誰もが真剣に考えるには高すぎることを確保する。"

	pfp_deploy_reinforcements:0 "[FROM.GetName]への増援派遣"
	pfp_deploy_reinforcements_desc:0 "占領地域は不穏で、駐屯地は手薄だ。新鮮な部隊の展開は現地での我々の存在を強化し、我々の手が長く、秩序への我々の忍耐が短いことを人口に思い知らせるだろう。送られる兵士一人一人は、組織された抵抗の棺にまた一本の釘だ。"

	pfp_ship_arms_to_garrison:0 "[FROM.GetName]駐屯地への武器輸送"
	pfp_ship_arms_to_garrison_desc:0 "適切な装備のない駐屯地は制服を着た存在以上ではない。占領地域の我々の部隊が適切に武装されるように — 戦うためだけでなく、誰がここで権力を持っているかをすべての通りとすべての村に思い知らせるために。よく供給された兵士は交渉しない。執行する。"
