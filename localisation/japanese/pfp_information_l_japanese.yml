	pfp_category:0 "Pipe's Formable Puppets"
	pfp_category_desc:0 "領土が拡大するにつれて、その統治が複雑な問題となっています。この問題に対処するため、征服した地域に我が国に忠実な傀儡政権を樹立すべきです。これにより、その地域が我々の大義を支える一方で、我々は別の場所に注意を向けることができます。"

	pfp_puppet_management:0 "Pipe's Formable Puppets - 管理"
