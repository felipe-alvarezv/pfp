	pfp_management_use_overlord_color_tooltip:0 "プレイヤーが支配するすべての国は平和状態にある。"

	pfp_management_resistance:0 "抵抗力学の切り替え"
	pfp_management_resistance_desc:0 "この決定は抵抗力学を有効または無効にします。有効にすると、形成可能な傀儡国はコア地域を取得できず、服従度を上げて抵抗を下げるためのフォーカスや決定を完了する必要があります。服従度が80%を超え、抵抗が20%を下回ると、州がコアになります。"

	pfp_puppet_integration_core_state:0 "平定領土の併合"
	pfp_puppet_integration_core_state_desc:0 "武力で奪ったものは、それ以上のものになるのに十分なほど長く保持されてきた。抵抗は崩れ、人口は再形成され、土地は我々の名のもとに生産する。別個の行政の見せかけを維持する理由はもはやない。これらの領土は国家に正式に吸収される — 占領地としてではなく、故郷の土として。かつて彼らのものだったものは今、そしてずっとそうであったように、我々のものだ。"
	pfp_puppet_integration_core_state_trigger_tooltip:0 "[pfp_puppet_core_resistance_status]"
	pfp_puppet_core_status_resistance_enabled:0 "以下のすべてが真でなければならない：\n      可能なコア州を完全に支配している。\n      可能なコア州は§Y[ROOT.GetName]§!のコアではない。\n      可能なコア州の服従度が80%以上である。\n      可能なコア州の抵抗が20%未満である。"
	pfp_puppet_core_status_resistance_disabled:0 "以下のすべてが真でなければならない：\n      可能なコア州を完全に支配している。\n      可能なコア州は§Y[ROOT.GetName]§!のコアではない。"
	pfp_puppet_integration_core_state_effect_tooltip:0 "前の要件を満たす可能なコア州はコアになります。"

	pfp_contest_state_tooltip:0 "争奪"
	pfp_core_state_tooltip:0 "コア州"











	pfp_the_iron_fist:0 "鉄の拳"
	pfp_the_iron_fist_desc:0 "傀儡は踊るが、糸は我々が握っている。この取り決めを恒久的なものにする時が来た。"

	pfp_boots_on_the_ground:0 "地上の兵士"
	pfp_boots_on_the_ground_desc:0 "言葉と外交にはその場所がある。その場所はここではない。我々の兵士は被占領者に、なぜ抵抗が彼らが負担できない贅沢であるかを思い知らせるだろう。"
	
	pfp_suppress_dissent:0 "異論の鎮圧"
	pfp_suppress_dissent_desc:0 "暗闇の中の囁きが大きくなっている。それは沈黙させられるだろう — 理性によってではなく、論争の余地を残さない種類の説得によって。"
	
	pfp_by_fire_and_steel:0 "火と鋼鉄で"
	pfp_by_fire_and_steel_desc:0 "決して屈しない者がいる。彼らには、交渉も、慈悲も、記憶も提供しない。灰だけだ。"
	
	pfp_rule_by_the_sword:0 "剣による支配"
	pfp_rule_by_the_sword_desc:0 "被占領者が毎朝目覚め、法律は我々が書くものであり、我々が執行するものだと知るようにせよ。秩序は維持される — いかなる代償を払ってでも。"
	
	pfp_eyes_everywhere:0 "至る所に目"
	pfp_eyes_everywhere_desc:0 "反乱を企てる男には、ただ一瞬のプライバシーが必要だ。我々はその男がそれを決して見つけられないようにするつもりだ。"

	pfp_purge_the_disloyal:0 "不忠者の粛清"
	pfp_purge_the_disloyal_desc:0 "基礎が腐っていれば家は立たない。旧秩序に仕えた者 — そして再び仕えるであろう者 — は、作業を始める前に排除しなければならない。"
	
	pfp_control_the_narrative:0 "言論の統制"
	pfp_control_the_narrative_desc:0 "歴史は勝者によって書かれる。我々は被占領者が我々の事件の版のみを読むようにし — そして時がたてば完全に信じるようにする。"
	
	pfp_erase_the_old_ways:0 "旧来の慣習の抹消"
	pfp_erase_the_old_ways_desc:0 "言語、文化、伝統 — これらは忘れることを拒む人々の武器だ。一つ一つ取り上げていく、覚えていることが何も残るまで。"

	pfp_bread_and_circuses:0 "パンと見世物"
	pfp_bread_and_circuses_desc:0 "すべての鎖が鉄でできているわけではない。快適さ、満腹感、安価な娯楽でできているものもある。満足している集団は従順な集団だ。"
	pfp_reshape_the_soul:0 "魂の再形成"
	pfp_reshape_the_soul_desc:0 "恐怖によって強制された服従は脆弱だ。持続するのは信念だ。我々は単に臣民が何をするかを支配するだけでなく — 彼らが何を望むかを変える。"

	pfp_the_last_decree:0 "最後の勅令"
	pfp_the_last_decree_desc:0 "それ以前のすべての命令はこの瞬間に向けて積み上げられてきた。宣言すべきことは何も残っておらず、争うべき権力も残っていない。これが単純に今の世界だ。"

	pfp_puppet_resistance_idea_1:0 "現地の抵抗"
	pfp_puppet_resistance_idea_1_desc:0 "被占領者は自分たちが誰であったかを忘れていない。通りで、野原で、閉ざされた扉の後ろでの静かな会話の中で — 反抗が息づいている。それは簡単には崩れず、静かには崩れない。"
	pfp_puppet_resistance_idea_2:0 "現地の抵抗"

	pfp_puppet_resistance_idea_2_desc:0 "被占領者は自分たちが誰であったかを忘れていない。通りで、野原で、閉ざされた扉の後ろでの静かな会話の中で — 反抗が息づいている。それは簡単には崩れず、静かには崩れない。"
