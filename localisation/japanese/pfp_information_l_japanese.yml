	pfp_puppet_resistance_idea_4_desc:0 "被占領者は自分たちが誰であったかを忘れていない。通りで、野原で、閉ざされた扉の後ろでの静かな会話の中で — 反抗が息づいている。それは簡単には崩れず、静かには崩れない。"
