	pfp_military_police_idea_1:0 "军事警察"
	pfp_military_police_idea_1_desc:0 "占领不仅靠士兵来赢得。每个驻军背后都有一个执法者网络——受过训练的人，不是为了战场，而是为了街角、检查站、深夜敲门。随着我们对被占领者的掌控收紧，他们的效率也随之提高。他们了解这片土地，了解这些人，确保任何剩余的抵抗永远找不到立足点。"
	
	pfp_military_police_idea_2:0 "军事警察"
	pfp_military_police_idea_2_desc:0 "占领不仅靠士兵来赢得。每个驻军背后都有一个执法者网络——受过训练的人，不是为了战场，而是为了街角、检查站、深夜敲门。随着我们对被占领者的掌控收紧，他们的效率也随之提高。他们了解这片土地，了解这些人，确保任何剩余的抵抗永远找不到立足点。"
	
	pfp_military_police_idea_3:0 "军事警察"
	pfp_military_police_idea_3_desc:0 "占领不仅靠士兵来赢得。每个驻军背后都有一个执法者网络——受过训练的人，不是为了战场，而是为了街角、检查站、深夜敲门。随着我们对被占领者的掌控收紧，他们的效率也随之提高。他们了解这片土地，了解这些人，确保任何剩余的抵抗永远找不到立足点。"

	pfp_civilian_collaborators_idea_1:0 "平民合作者"
	pfp_civilian_collaborators_idea_1_desc:0 "并非所有对占领的抵抗都来自士兵和游击队。其中很多生活在普通人中——漠视的邻居、传递消息的店主、窝藏错误客人的家庭。但人是可以被转化的。通过利诱，通过恐惧，通过对旧忠诚的缓慢侵蚀，被占领者中的一些人开始为占领者服务。他们观察。他们汇报。随着每个月过去，抵抗之火能够呼吸的地方越来越少。"

	pfp_civilian_collaborators_idea_2:0 "平民合作者"
	pfp_civilian_collaborators_idea_2_desc:0 "并非所有对占领的抵抗都来自士兵和游击队。其中很多生活在普通人中——漠视的邻居、传递消息的店主、窝藏错误客人的家庭。但人是可以被转化的。通过利诱，通过恐惧，通过对旧忠诚的缓慢侵蚀，被占领者中的一些人开始为占领者服务。他们观察。他们汇报。随着每个月过去，抵抗之火能够呼吸的地方越来越少。"

	pfp_civilian_collaborators_idea_3:0 "平民合作者"
	pfp_civilian_collaborators_idea_3_desc:0 "并非所有对占领的抵抗都来自士兵和游击队。其中很多生活在普通人中——漠视的邻居、传递消息的店主、窝藏错误客人的家庭。但人是可以被转化的。通过利诱，通过恐惧，通过对旧忠诚的缓慢侵蚀，被占领者中的一些人开始为占领者服务。他们观察。他们汇报。随着每个月过去，抵抗之火能够呼吸的地方越来越少。"

	pfp_puppet_integration:0 "整合被占领者"
	pfp_puppet_integration_desc:0 "占领持续了足够长的时间，某些领土不再感觉陌生。人们已被平定，旧习已被遗忘，国家机器以我们的名义运转。是时候停止把这些土地当作征服的领土，而开始把它们当作它们真正的样子——我们的。"

	pfp_puppet_assistance:0 "派普可组建的傀儡——傀儡援助"
	pfp_puppet_assistance_desc:0 "傀儡国只有握住它的手那么强大。没有支持，即使是最顺从的政权也会在其自身被占领人口的重压下垮塌。我们不会允许这种情况。通过稳定的人力和物资流动，我们确保在这一领土上的投资得到保护——并且抵抗的代价高到任何人都无法认真考虑。"

	pfp_deploy_reinforcements:0 "向[FROM.GetName]派遣增援"
	pfp_deploy_reinforcements_desc:0 "占领地区局势动荡，我们的驻军严重不足。新一批部队的部署将加强我们在当地的存在，提醒民众我们的触角很长，对混乱的忍耐很短。每送出一名士兵，都是有组织抵抗棺木上的又一枚钉子。"

	pfp_ship_arms_to_garrison:0 "向[FROM.GetName]驻军输送武器"
	pfp_ship_arms_to_garrison_desc:0 "缺乏适当装备的驻军不过是一支穿制服的存在。我们将确保占领地区的部队得到妥善武装——不仅仅是为了战斗，而是要让每条街道和每个村庄都清楚地知道谁在这里掌握权力。供给充足的士兵不会谈判。他们只会执行。"
