	pfp_category:0 "管道可塑木偶"
	pfp_category_desc:0 "随着我们获得的领土增加，管理所有的领土已经成了一个复杂的问题。为了解决这个问题，应该在我们征服的区域建立忠于我们国家的傀儡政府。这将使我们能将姿态放在其他地方，而该地区有助于我们的事业。"

	pfp_puppet_management:0 "管道可塑形傀儡-管理"
	pfp_puppet_management_desc:0 "在确立我们的军事占领之后，我们可能需要对行政和领土做出调整。"
