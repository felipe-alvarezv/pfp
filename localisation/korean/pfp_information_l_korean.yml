#Decision Description Localization
l_korean:
	pfp_category:0 "Pipe's Formable Puppets"
	pfp_category_desc:0 "영토를 넓혀갈수록 이를 모두 통치하는 것이 복잡한 문제가 되었습니다. 이 문제를 해결하기 위해, 우리가 정복한 지역에 우리 나라에 충성하는 괴뢰 정부를 수립해야 합니다. 이를 통해 해당 지역이 우리의 대의를 돕는 동안 우리는 다른 곳에 주의를 집중할 수 있습니다."

	pfp_puppet_management:0 "Pipe's Formable Puppets - 관리"
	pfp_puppet_management_desc:0 "군사 점령을 수립한 후, 행정과 그 영토에 관한 조정이 필요할 수 있습니다."
	pfp_management_option_enabled:0 "활성화"
	pfp_management_option_disabled:0 "비활성화"

	pfp_management_window:0 "관리 메뉴 열기"
	pfp_management_use_overlord_color:0 "종주국 색상 괴뢰국가 표시 전환"
	pfp_management_use_overlord_color_tooltip:0 "플레이어가 지배하는 모든 국가는 평화 상태입니다."

	pfp_management_resistance:0 "저항 메커니즘 전환"
	pfp_management_resistance_desc:0 "이 결정은 저항 메커니즘을 활성화하거나 비활성화합니다. 활성화하면 형성 가능한 괴뢰 국가는 핵심 지역을 얻지 못하며, 순응도를 높이고 저항을 낮추기 위한 포커스와 결정을 완료해야 합니다. 순응도가 80%를 초과하고 저항이 20% 미만이 되면 주가 핵심이 됩니다."

	pfp_puppet_integration_core_state:0 "평정된 영토 합병"
	pfp_puppet_integration_core_state_desc:0 "무력으로 빼앗은 것이 더 많은 것이 되기에 충분할 만큼 오래 보유되었다. 저항은 무너졌고, 인구는 재형성되었으며, 땅은 우리의 이름으로 생산한다. 별개의 행정을 유지하는 척할 이유가 더 이상 없다. 이 영토들은 국가에 공식적으로 흡수될 것이다 — 점령지로서가 아니라, 고향의 땅으로서. 그들의 것이었던 것이 지금, 그리고 항상 그래왔듯이, 우리의 것이다."
	pfp_puppet_integration_core_state_trigger_tooltip:0 "[pfp_puppet_core_resistance_status]"
	pfp_puppet_core_status_resistance_enabled:0 "다음 모든 조건이 충족되어야 합니다:\n      가능한 모든 핵심 지역을 완전히 통제해야 합니다.\n      가능한 모든 핵심 지역이 §Y[ROOT.GetName]§!의 핵심이 아니어야 합니다.\n      가능한 모든 핵심 지역의 순응도가 80% 이상이어야 합니다.\n      가능한 모든 핵심 지역의 저항이 20% 미만이어야 합니다."
	pfp_puppet_core_status_resistance_disabled:0 "다음 모든 조건이 충족되어야 합니다:\n      가능한 모든 핵심 지역을 완전히 통제해야 합니다.\n      가능한 모든 핵심 지역이 §Y[ROOT.GetName]§!의 핵심이 아니어야 합니다."
	pfp_puppet_integration_core_state_effect_tooltip:0 "이전 요구 사항을 충족하는 가능한 모든 핵심 지역이 핵심이 됩니다."

