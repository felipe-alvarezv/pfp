	pfp_category:0 "Pipe's Formable Puppets"
	pfp_category_desc:0 "Mit der Ausweitung unseres Territoriums ist es zunehmend schwierig geworden, all dies zu verwalten. Um dieses Problem zu lösen, sollten Marionettenregierungen eingerichtet werden, die unserem Land treu ergeben sind. Dies erlaubt uns, unsere Aufmerksamkeit anderen Dingen zuzuwenden, während die Region unsere Sache unterstützt."

	pfp_puppet_management:0 "Pipe's Formable Puppets - Verwaltung"
