#Decision Description Localization
l_russian:
	pfp_category:0 "Pipe's Formable Puppets"
	pfp_category_desc:0 "По мере расширения наших территорий управление ими стало сложной задачей. Чтобы решить её, в завоёванных нами регионах следует установить марионеточные правительства, лояльные нашей нации. Это позволит нам сосредоточить внимание в других местах, пока регион служит нашему делу."

	pfp_puppet_management:0 "Pipe's Formable Puppets - Управление"
	pfp_puppet_management_desc:0 "После установления военной оккупации нам, возможно, потребуется внести коррективы в управление и его территории."
	pfp_management_option_enabled:0 "Включено"
	pfp_management_option_disabled:0 "Отключено"

	pfp_management_window:0 "Открыть меню управления"
	pfp_management_use_overlord_color:0 "Переключить цвета марионеток сюзерена"
	pfp_management_use_overlord_color_tooltip:0 "Все страны под контролем игрока находятся в состоянии мира."

	pfp_management_resistance:0 "Переключить механики сопротивления"
	pfp_management_resistance_desc:0 "Это решение включает или отключает механики сопротивления. Если включено, формируемые марионетки не получат коренных территорий и должны будут выполнять фокусы и решения для повышения соответствия и снижения сопротивления. Государство станет коренным, когда соответствие превысит 80% и сопротивление опустится ниже 20%."

	pfp_puppet_integration_core_state:0 "Аннексировать умиротворённую территорию"
	pfp_puppet_integration_core_state_desc:0 "То, что было захвачено силой, удерживалось достаточно долго, чтобы стать чем-то большим. Сопротивление сломлено, население переформировано, и земля работает во имя наше. Больше нет причин поддерживать видимость отдельной администрации. Эти территории будут формально поглощены государством — не как оккупированная земля, а как родная почва. То, что было их, теперь есть, и всегда было, нашим."
	pfp_puppet_integration_core_state_trigger_tooltip:0 "[pfp_puppet_core_resistance_status]"
	pfp_puppet_core_status_resistance_enabled:0 "Все следующие условия должны быть выполнены:\n      Полностью контролирует любую возможную коренную территорию.\n      Любая возможная коренная территория не является коренной для §Y[ROOT.GetName]§!.\n      Любая возможная коренная территория имеет более 80% соответствия.\n      Любая возможная коренная территория имеет менее 20% сопротивления."
	pfp_puppet_core_status_resistance_disabled:0 "Все следующие условия должны быть выполнены:\n      Полностью контролирует любую возможную коренную территорию.\n      Любая возможная коренная территория не является коренной для §Y[ROOT.GetName]§!."
	pfp_puppet_integration_core_state_effect_tooltip:0 "Любая возможная коренная территория, соответствующая предыдущим требованиям, станет коренной."

	pfp_contest_state_tooltip:0 "оспаривание"
