	pfp_the_iron_fist:0 "Железный кулак"
	pfp_the_iron_fist_desc:0 "Марионетка танцует, но мы держим нити. Пора сделать это соглашение постоянным."

	pfp_boots_on_the_ground:0 "Сапоги на земле"
	pfp_boots_on_the_ground_desc:0 "Слова и дипломатия имеют своё место. Это место не здесь. Наши солдаты напомнят оккупированным, почему сопротивление — роскошь, которую они не могут себе позволить."
	
	pfp_suppress_dissent:0 "Подавить инакомыслие"
	pfp_suppress_dissent_desc:0 "Шёпот в темноте становится громче. Он будет заглушён — не разумом, а тем видом убеждения, который не оставляет места для споров."
	
	pfp_by_fire_and_steel:0 "Огнём и сталью"
	pfp_by_fire_and_steel_desc:0 "Есть те, кто никогда не согнётся. Для них мы не предлагаем ни переговоров, ни пощады, ни памяти. Только пепел."
	
	pfp_rule_by_the_sword:0 "Власть меча"
	pfp_rule_by_the_sword_desc:0 "Пусть оккупированные просыпаются каждое утро, зная, что закон наш — и писать, и применять. Порядок будет поддерживаться — любой ценой."
	
	pfp_eyes_everywhere:0 "Глаза повсюду"
	pfp_eyes_everywhere_desc:0 "Человеку, планирующему восстание, нужен лишь один момент уединения. Мы намерены гарантировать, что он его никогда не найдёт."

	pfp_purge_the_disloyal:0 "Очистить нелояльных"
	pfp_purge_the_disloyal_desc:0 "Дом не может стоять, если его основы прогнили. Те, кто служил старому порядку — и сделали бы это снова — должны быть устранены, прежде чем работа может начаться."
	
	pfp_control_the_narrative:0 "Контролировать нарратив"
	pfp_control_the_narrative_desc:0 "История пишется победителями. Мы обеспечим, чтобы оккупированные читали только нашу версию событий — и со временем поверили ей полностью."
	
	pfp_erase_the_old_ways:0 "Стереть старые традиции"
	pfp_erase_the_old_ways_desc:0 "Язык, культура, традиция — это оружие народа, который отказывается забывать. Мы будем отнимать их одно за другим, пока не останется ничего, что можно помнить."

	pfp_bread_and_circuses:0 "Хлеб и зрелища"
	pfp_bread_and_circuses_desc:0 "Не все цепи из железа. Некоторые сделаны из комфорта, из сытых желудков и дешёвых развлечений. Довольное население — покорное население."
	pfp_reshape_the_soul:0 "Переформировать душу"
	pfp_reshape_the_soul_desc:0 "Подчинение, навязанное страхом, хрупко. То, что длится — это вера. Мы не просто будем контролировать, что делают наши подданные — мы изменим то, чего они хотят."

	pfp_the_last_decree:0 "Последний указ"
	pfp_the_last_decree_desc:0 "Каждый предшествующий приказ вёл к этому моменту. Больше нечего объявлять, нет власти для оспаривания. Это просто мир, теперь."

	pfp_puppet_resistance_idea_1:0 "Местное сопротивление"
	pfp_puppet_resistance_idea_1_desc:0 "Оккупированные не забыли, кем они были. На улицах, на полях, в приглушённых разговорах за закрытыми дверями — непокорность таится. Она не сломится легко и не сломится тихо."
	pfp_puppet_resistance_idea_2:0 "Местное сопротивление"

	pfp_puppet_resistance_idea_2_desc:0 "Оккупированные не забыли, кем они были. На улицах, на полях, в приглушённых разговорах за закрытыми дверями — непокорность таится. Она не сломится легко и не сломится тихо."
	pfp_puppet_resistance_idea_3:0 "Местное сопротивление"

	pfp_puppet_resistance_idea_3_desc:0 "Оккупированные не забыли, кем они были. На улицах, на полях, в приглушённых разговорах за закрытыми дверями — непокорность таится. Она не сломится легко и не сломится тихо."
	pfp_puppet_resistance_idea_4:0 "Местное сопротивление"

	pfp_puppet_resistance_idea_4_desc:0 "Оккупированные не забыли, кем они были. На улицах, на полях, в приглушённых разговорах за закрытыми дверями — непокорность таится. Она не сломится легко и не сломится тихо."
	pfp_puppet_resistance_idea_5:0 "Местное сопротивление"

	pfp_puppet_resistance_idea_5_desc:0 "Оккупированные не забыли, кем они были. На улицах, на полях, в приглушённых разговорах за закрытыми дверями — непокорность таится. Она не сломится легко и не сломится тихо."

	pfp_military_police_idea_1:0 "Военная полиция"
	pfp_military_police_idea_1_desc:0 "Оккупацию не выиграть одними солдатами. За каждым гарнизоном стоит сеть исполнителей — людей, обученных не для поля боя, а для уличного угла, блокпоста, полуночного стука в дверь. По мере того, как наша хватка на оккупированных усиливается, их эффективность тоже растёт. Они учат землю, они учат людей, и следят, чтобы любое оставшееся сопротивление никогда не нашло почвы."
	
	pfp_military_police_idea_2:0 "Военная полиция"
	pfp_military_police_idea_2_desc:0 "Оккупацию не выиграть одними солдатами. За каждым гарнизоном стоит сеть исполнителей — людей, обученных не для поля боя, а для уличного угла, блокпоста, полуночного стука в дверь. По мере того, как наша хватка на оккупированных усиливается, их эффективность тоже растёт. Они учат землю, они учат людей, и следят, чтобы любое оставшееся сопротивление никогда не нашло почвы."
	
	pfp_military_police_idea_3:0 "Военная полиция"
	pfp_military_police_idea_3_desc:0 "Оккупацию не выиграть одними солдатами. За каждым гарнизоном стоит сеть исполнителей — людей, обученных не для поля боя, а для уличного угла, блокпоста, полуночного стука в дверь. По мере того, как наша хватка на оккупированных усиливается, их эффективность тоже растёт. Они учат землю, они учат людей, и следят, чтобы любое оставшееся сопротивление никогда не нашло почвы."

	pfp_civilian_collaborators_idea_1:0 "Гражданские коллаборационисты"
	pfp_civilian_collaborators_idea_1_desc:0 "Не всё сопротивление оккупации исходит от солдат и партизан. Многое из него живёт в обычных людях — соседях, смотрящих в другую сторону, лавочниках, передающих сообщения, семьях, укрывающих не тех гостей. Но людей можно переубедить. Через стимулы, через страх, через медленное разрушение старых лояльностей, некоторые из оккупированных начинают служить оккупанту. Они наблюдают. Они докладывают. И с каждым месяцем огонь сопротивления находит всё меньше мест, где дышать."

	pfp_civilian_collaborators_idea_2:0 "Гражданские коллаборационисты"
	pfp_civilian_collaborators_idea_2_desc:0 "Не всё сопротивление оккупации исходит от солдат и партизан. Многое из него живёт в обычных людях — соседях, смотрящих в другую сторону, лавочниках, передающих сообщения, семьях, укрывающих не тех гостей. Но людей можно переубедить. Через стимулы, через страх, через медленное разрушение старых лояльностей, некоторые из оккупированных начинают служить оккупанту. Они наблюдают. Они докладывают. И с каждым месяцем огонь сопротивления находит всё меньше мест, где дышать."

	pfp_civilian_collaborators_idea_3:0 "Гражданские коллаборационисты"
	pfp_civilian_collaborators_idea_3_desc:0 "Не всё сопротивление оккупации исходит от солдат и партизан. Многое из него живёт в обычных людях — соседях, смотрящих в другую сторону, лавочниках, передающих сообщения, семьях, укрывающих не тех гостей. Но людей можно переубедить. Через стимулы, через страх, через медленное разрушение старых лояльностей, некоторые из оккупированных начинают служить оккупанту. Они наблюдают. Они докладывают. И с каждым месяцем огонь сопротивления находит всё меньше мест, где дышать."

	pfp_puppet_integration:0 "Интегрировать оккупированных"
	pfp_puppet_integration_desc:0 "Оккупация длилась достаточно долго, чтобы определённые территории перестали ощущаться чужими. Люди были умиротворены, старые традиции забыты, и государственная машина работает в нашем имени. Пора перестать относиться к этим землям как к завоёванной территории и начать относиться к ним как к тому, чем они действительно являются — нашими."

	pfp_puppet_assistance:0 "Формируемые марионетки Пайпа — Помощь марионеткам"
	pfp_puppet_assistance_desc:0 "Марионеточное государство сильно лишь настолько, насколько сильна рука, держащая его. Без поддержки даже самый покорный режим рухнет под тяжестью собственного оккупированного населения. Мы этого не допустим. Через неизменный поток рабочей силы и материалов мы обеспечиваем защищённость наших инвестиций в эту территорию — и то, что стоимость сопротивления остаётся слишком высокой, чтобы кто-либо всерьёз рассматривал её."

	pfp_deploy_reinforcements:0 "Направить подкрепления в [FROM.GetName]"
	pfp_deploy_reinforcements_desc:0 "Оккупированные территории неспокойны, а наш гарнизон растянут. Новое развёртывание войск укрепит наше присутствие на местах, напоминая населению, что наша рука длинна, а терпение к беспорядку коротко. Каждый отправленный солдат — ещё один гвоздь в гроб организованного сопротивления."

	pfp_ship_arms_to_garrison:0 "Доставить оружие гарнизону [FROM.GetName]"
	pfp_ship_arms_to_garrison_desc:0 "A garrison without adequate equipment is little more than a uniformed presence. We will see to it that our forces in the occupied territories are properly armed — not just to fight, but to remind every street and every village exactly who holds power here. Well supplied soldiers do not negotiate. They enforce."