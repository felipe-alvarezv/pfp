	pfp_management_tooltip_close_button:0 "Закрыть интерфейс управления."
	pfp_management_tooltip_view_puppets:0 "Отображает все формируемые марионеточные государства под контролем игрока вместе с их текущими территориями и ключевыми землями."
	pfp_management_tooltip_state_transfer:0 "Отображает параметры передачи территорий, которые можно использовать для перемещения земель между игроком и его марионетками."

