	pfp_puppet_resistance_idea_2_desc:0 "Les occupés n'ont pas oublié qui ils étaient. Dans les rues, dans les champs, dans les conversations à voix basse derrière des portes closes — le défi s'attarde. Il ne cédera pas facilement, et il ne cédera pas silencieusement."
