	pfp_category:0 "Marionnettes formables de Pipe"
	pfp_category_desc:0 "À mesure que nous gagnons du territoire, il devient de plus en plus compliqué de tout administrer. Pour résoudre ce problème, des gouvernements fantoches loyaux à notre nation devraient être établis dans les régions que nous avons conquises. Cela nous permettra de porter notre attention ailleurs, tandis que la région soutient notre cause."

	pfp_puppet_management:0 "Marionnettes formables de Pipe - Gestion"
