	pfp_military_police_idea_1:0 "Police Militaire"
	pfp_military_police_idea_1_desc:0 "L'occupation n'est pas gagnée par les soldats seuls. Derrière chaque garnison se trouve un réseau d'exécutants — des hommes formés non pas pour le champ de bataille, mais pour le coin de rue, le point de contrôle, le coup de minuit à la porte. À mesure que notre emprise sur les occupés se resserre, leur efficacité aussi. Ils apprennent le terrain, ils apprennent les gens, et ils s'assurent que tout ce qui reste de résistance ne trouve jamais sa place."
	
	pfp_military_police_idea_2:0 "Police Militaire"
	pfp_military_police_idea_2_desc:0 "L'occupation n'est pas gagnée par les soldats seuls. Derrière chaque garnison se trouve un réseau d'exécutants — des hommes formés non pas pour le champ de bataille, mais pour le coin de rue, le point de contrôle, le coup de minuit à la porte. À mesure que notre emprise sur les occupés se resserre, leur efficacité aussi. Ils apprennent le terrain, ils apprennent les gens, et ils s'assurent que tout ce qui reste de résistance ne trouve jamais sa place."
	
	pfp_military_police_idea_3:0 "Police Militaire"
	pfp_military_police_idea_3_desc:0 "L'occupation n'est pas gagnée par les soldats seuls. Derrière chaque garnison se trouve un réseau d'exécutants — des hommes formés non pas pour le champ de bataille, mais pour le coin de rue, le point de contrôle, le coup de minuit à la porte. À mesure que notre emprise sur les occupés se resserre, leur efficacité aussi. Ils apprennent le terrain, ils apprennent les gens, et ils s'assurent que tout ce qui reste de résistance ne trouve jamais sa place."

	pfp_civilian_collaborators_idea_1:0 "Collaborateurs Civils"
	pfp_civilian_collaborators_idea_1_desc:0 "Toute la résistance à l'occupation ne vient pas des soldats et des partisans. Une grande partie vit dans les gens ordinaires — des voisins qui regardent de l'autre côté, des commerçants qui transmettent des messages, des familles qui abritent les mauvais invités. Mais les gens peuvent être retournés. Par l'incitation, par la peur, par l'érosion lente des vieilles loyautés, certains parmi les occupés commencent à servir l'occupant. Ils observent. Ils rapportent. Et avec chaque mois qui passe, le feu de la résistance trouve moins d'endroits où respirer."

	pfp_civilian_collaborators_idea_2:0 "Collaborateurs Civils"
	pfp_civilian_collaborators_idea_2_desc:0 "Toute la résistance à l'occupation ne vient pas des soldats et des partisans. Une grande partie vit dans les gens ordinaires — des voisins qui regardent de l'autre côté, des commerçants qui transmettent des messages, des familles qui abritent les mauvais invités. Mais les gens peuvent être retournés. Par l'incitation, par la peur, par l'érosion lente des vieilles loyautés, certains parmi les occupés commencent à servir l'occupant. Ils observent. Ils rapportent. Et avec chaque mois qui passe, le feu de la résistance trouve moins d'endroits où respirer."

	pfp_civilian_collaborators_idea_3:0 "Collaborateurs Civils"
	pfp_civilian_collaborators_idea_3_desc:0 "Toute la résistance à l'occupation ne vient pas des soldats et des partisans. Une grande partie vit dans les gens ordinaires — des voisins qui regardent de l'autre côté, des commerçants qui transmettent des messages, des familles qui abritent les mauvais invités. Mais les gens peuvent être retournés. Par l'incitation, par la peur, par l'érosion lente des vieilles loyautés, certains parmi les occupés commencent à servir l'occupant. Ils observent. Ils rapportent. Et avec chaque mois qui passe, le feu de la résistance trouve moins d'endroits où respirer."

	pfp_puppet_integration:0 "Intégrer les Occupés"
	pfp_puppet_integration_desc:0 "L'occupation a duré assez longtemps pour que certains territoires ne se sentent plus étrangers. Les gens ont été pacifiés, les anciennes traditions oubliées, et la machinerie de l'État fonctionne en notre nom. Il est temps de cesser de traiter ces terres comme du terrain conquis et de commencer à les traiter pour ce qu'elles sont vraiment — les nôtres."

	pfp_puppet_assistance:0 "Marionnettes Formables de Pipe — Assistance aux Marionnettes"
	pfp_puppet_assistance_desc:0 "Un État fantoche n'est aussi fort que la main qui le tient. Sans soutien, même le régime le plus docile succombera sous le poids de sa propre population occupée. Nous ne le permettrons pas. Grâce au flux régulier de main-d'oeuvre et de matériel, nous veillons à ce que notre investissement dans ce territoire reste protégé — et que le coût de la résistance reste trop élevé pour que quiconque l'envisage sérieusement."

	pfp_deploy_reinforcements:0 "Déployer des Renforts à [FROM.GetName]"
	pfp_deploy_reinforcements_desc:0 "Les territoires occupés sont agités, et notre garnison est à bout de souffle. Un nouveau déploiement de troupes renforcera notre présence sur le terrain, rappelant à la population que notre portée est longue et que notre patience pour le désordre est courte. Chaque soldat envoyé est un clou de plus dans le cercueil de la résistance organisée."

	pfp_ship_arms_to_garrison:0 "Expédier des Armes à la Garnison de [FROM.GetName]"
	pfp_ship_arms_to_garrison_desc:0 "Une garnison sans équipement adéquat n'est guère plus qu'une présence en uniforme. Nous veillerons à ce que nos forces dans les territoires occupés soient correctement armées — non pas seulement pour combattre, mais pour rappeler à chaque rue et chaque village exactement qui détient le pouvoir ici. Des soldats bien approvisionnés ne négocient pas. Ils appliquent."
