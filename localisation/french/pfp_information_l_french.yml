	pfp_management_use_overlord_color_tooltip:0 "Tous les pays contrôlés par le joueur sont en paix."

	pfp_management_resistance:0 "Activer les mécaniques de résistance"
	pfp_management_resistance_desc:0 "Cette décision active ou désactive les mécaniques de résistance. Si activée, les marionnettes formables n'obtiendront pas de coeurs et devront compléter des objectifs et des décisions pour augmenter la conformité et réduire la résistance. Un État sera intégré une fois que la conformité dépasse 80% et la résistance est en dessous de 20%."

	pfp_puppet_integration_core_state:0 "Annexer le territoire pacifié"
	pfp_puppet_integration_core_state_desc:0 "Ce qui a été pris par la force a été détenu suffisamment longtemps pour devenir quelque chose de plus. La résistance a cédé, la population a été refaçonnée, et la terre produit en notre nom. Il n'y a plus aucune raison de maintenir l'illusion d'une administration séparée. Ces territoires seront formellement absorbés dans l'État — non pas comme terres occupées, mais comme sol natal. Ce qui était à eux est maintenant, et a toujours été, à nous."
	pfp_puppet_integration_core_state_trigger_tooltip:0 "[pfp_puppet_core_resistance_status]"
	pfp_puppet_core_status_resistance_enabled:0 "Tout ce qui suit doit être vrai :\n      Contrôle entièrement tout coeur possible.\n      Tout coeur possible n'est pas coeur de §Y[ROOT.GetName]§!.\n      Tout coeur possible a plus de 80% de conformité.\n      Tout coeur possible a moins de 20% de résistance."
	pfp_puppet_core_status_resistance_disabled:0 "Tout ce qui suit doit être vrai :\n      Contrôle entièrement tout coeur possible.\n      Tout coeur possible n'est pas coeur de §Y[ROOT.GetName]§!."
	pfp_puppet_integration_core_state_effect_tooltip:0 "Tout coeur possible répondant aux exigences précédentes sera intégré."

	pfp_contest_state_tooltip:0 "contestation"
	pfp_core_state_tooltip:0 "coeurs"











	pfp_the_iron_fist:0 "La Poigne de Fer"
	pfp_the_iron_fist_desc:0 "La marionnette danse, mais nous tenons les ficelles. Il est temps de rendre cet arrangement permanent."

	pfp_boots_on_the_ground:0 "Les Bottes sur le Terrain"
	pfp_boots_on_the_ground_desc:0 "Les mots et la diplomatie ont leur place. Cette place n'est pas ici. Nos soldats rappelleront aux occupés pourquoi la résistance est un luxe qu'ils ne peuvent pas se permettre."
	
	pfp_suppress_dissent:0 "Réprimer la Dissidence"
	pfp_suppress_dissent_desc:0 "Les murmures dans l'obscurité se font de plus en plus forts. Ils seront réduits au silence — non par la raison, mais par le genre de persuasion qui ne laisse aucune place à l'argumentation."
	
	pfp_by_fire_and_steel:0 "Par le Feu et l'Acier"
	pfp_by_fire_and_steel_desc:0 "Il y a ceux qui ne plieront jamais. Pour eux, nous n'offrons aucune négociation, aucune pitié, aucun souvenir. Seulement des cendres."
	
	pfp_rule_by_the_sword:0 "Gouverner par l'Épée"
	pfp_rule_by_the_sword_desc:0 "Que les occupés se réveillent chaque matin en sachant que la loi est à nous d'écrire, et à nous d'appliquer. L'ordre sera maintenu — à n'importe quel prix."
	
	pfp_eyes_everywhere:0 "Des Yeux Partout"
	pfp_eyes_everywhere_desc:0 "Un homme qui complote une rébellion n'a besoin que d'un moment d'intimité. Nous entendons nous assurer qu'il ne le trouve jamais."

	pfp_purge_the_disloyal:0 "Purger les Déloyaux"
	pfp_purge_the_disloyal_desc:0 "Une maison ne peut tenir si ses fondations sont pourries. Ceux qui ont servi l'ancien ordre — et le serviraient à nouveau — doivent être écartés avant que le travail puisse commencer."
	
	pfp_control_the_narrative:0 "Contrôler le Récit"
	pfp_control_the_narrative_desc:0 "L'histoire est écrite par les vainqueurs. Nous veillerons à ce que les occupés ne lisent que notre version des événements — et qu'avec le temps, ils y croient complètement."
	
	pfp_erase_the_old_ways:0 "Effacer les Anciennes Traditions"
	pfp_erase_the_old_ways_desc:0 "La langue, la culture, la tradition — ce sont les armes d'un peuple qui refuse d'oublier. Nous les leur enlèverons, une par une, jusqu'à ce qu'il ne reste rien à se rappeler."

	pfp_bread_and_circuses:0 "Du Pain et des Jeux"
	pfp_bread_and_circuses_desc:0 "Toutes les chaînes ne sont pas faites de fer. Certaines sont faites de confort, de ventres pleins et de divertissements bon marché. Une population satisfaite est une population docile."
	pfp_reshape_the_soul:0 "Remodeler l'Âme"
	pfp_reshape_the_soul_desc:0 "La conformité imposée par la peur est fragile. Ce qui dure, c'est la croyance. Nous ne nous contenterons pas de contrôler ce que font nos sujets — nous changerons ce qu'ils désirent."

	pfp_the_last_decree:0 "Le Dernier Décret"
	pfp_the_last_decree_desc:0 "Chaque ordre qui l'a précédé construisait vers ce moment. Il ne reste rien à déclarer, aucun pouvoir à contester. C'est simplement le monde, maintenant."

	pfp_puppet_resistance_idea_1:0 "Résistance Locale"
	pfp_puppet_resistance_idea_1_desc:0 "Les occupés n'ont pas oublié qui ils étaient. Dans les rues, dans les champs, dans les conversations à voix basse derrière des portes closes — le défi s'attarde. Il ne cédera pas facilement, et il ne cédera pas silencieusement."
