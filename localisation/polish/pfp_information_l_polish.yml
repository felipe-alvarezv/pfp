#Decision Description Localization
l_polish:
	pfp_category:0 "Pipe's Formable Puppets"
	pfp_category_desc:0 "W miarę zdobywania kolejnych terytoriów, zarządzanie nimi stało się skomplikowanym problemem. Aby go rozwiązać, w podbitych przez nas regionach należy ustanowić marionetkowe rządy lojalne wobec naszego narodu. Pozwoli nam to skupić uwagę gdzie indziej, podczas gdy region wspiera naszą sprawę."

	pfp_puppet_management:0 "Pipe's Formable Puppets - Zarządzanie"
	pfp_puppet_management_desc:0 "Po ustanowieniu okupacji wojskowej może być konieczne wprowadzenie zmian dotyczących administracji i jej terytoriów."
	pfp_management_option_enabled:0 "Włączone"
	pfp_management_option_disabled:0 "Wyłączone"

	pfp_management_window:0 "Otwórz menu zarządzania"
	pfp_management_use_overlord_color:0 "Przełącz kolory marionetek suzerena"
	pfp_management_use_overlord_color_tooltip:0 "Wszystkie kraje kontrolowane przez gracza są w stanie pokoju."

	pfp_management_resistance:0 "Przełącz mechaniki oporu"
	pfp_management_resistance_desc:0 "Ta decyzja włącza lub wyłącza mechaniki oporu. Jeśli włączone, formowalne marionetkowe państwa nie otrzymają terytoriów rdzennych i będą musiały ukończyć fokuse i decyzje, aby zwiększyć zgodność i zmniejszyć opór. Państwo stanie się terytorium rdzennym, gdy zgodność przekroczy 80%, a opór spadnie poniżej 20%."

	pfp_puppet_integration_core_state:0 "Anektuj spacyfikowane terytorium"
	pfp_puppet_integration_core_state_desc:0 "To, co zostało wzięte siłą, było trzymane wystarczająco długo, aby stać się czymś więcej. Opór się załamał, populacja została przeformowana, a ziemia produkuje w naszym imieniu. Nie ma już powodu, aby utrzymywać pozory oddzielnej administracji. Te terytoria zostaną formalnie wchłonięte do państwa — nie jako ziemia zajęta, ale jako gleba ojczysta. To, co było ich, jest teraz, i zawsze było, nasze."
	pfp_puppet_integration_core_state_trigger_tooltip:0 "[pfp_puppet_core_resistance_status]"
	pfp_puppet_core_status_resistance_enabled:0 "Wszystkie poniższe muszą być prawdziwe:\n      W pełni kontroluje każde możliwe terytorium rdzenne.\n      Żadne możliwe terytorium rdzenne nie jest rdzenne dla §Y[ROOT.GetName]§!.\n      Każde możliwe terytorium rdzenne ma ponad 80% zgodności.\n      Każde możliwe terytorium rdzenne ma poniżej 20% oporu."
	pfp_puppet_core_status_resistance_disabled:0 "Wszystkie poniższe muszą być prawdziwe:\n      W pełni kontroluje każde możliwe terytorium rdzenne.\n      Żadne możliwe terytorium rdzenne nie jest rdzenne dla §Y[ROOT.GetName]§!."
	pfp_puppet_integration_core_state_effect_tooltip:0 "Każde możliwe terytorium rdzenne spełniające poprzednie wymagania stanie się rdzenne."

