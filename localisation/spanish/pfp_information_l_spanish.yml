	pfp_puppet_resistance_idea_3_desc:0 "Los ocupados no han olvidado quiénes eran. En las calles, en los campos, en las conversaciones en susurros detrás de puertas cerradas — la defensa persiste. No se romperá fácilmente, y no se romperá en silencio."
	pfp_puppet_resistance_idea_4:0 "Resistencia Local"

	pfp_puppet_resistance_idea_4_desc:0 "Los ocupados no han olvidado quiénes eran. En las calles, en los campos, en las conversaciones en susurros detrás de puertas cerradas — la defensa persiste. No se romperá fácilmente, y no se romperá en silencio."
	pfp_puppet_resistance_idea_5:0 "Resistencia Local"

	pfp_puppet_resistance_idea_5_desc:0 "Los ocupados no han olvidado quiénes eran. En las calles, en los campos, en las conversaciones en susurros detrás de puertas cerradas — la defensa persiste. No se romperá fácilmente, y no se romperá en silencio."

	pfp_military_police_idea_1:0 "Policía Militar"
	pfp_military_police_idea_1_desc:0 "La ocupación no se gana solo con soldados. Detrás de cada guarnición hay una red de ejecutores — hombres entrenados no para el campo de batalla, sino para la esquina de la calle, el punto de control, el golpe de medianoche en la puerta. A medida que nuestro control sobre los ocupados se estrecha, también lo hace su eficiencia. Aprenden la tierra, aprenden a la gente, y se aseguran de que cualquier resistencia que quede nunca encuentre su lugar."
	
	pfp_military_police_idea_2:0 "Policía Militar"
	pfp_military_police_idea_2_desc:0 "La ocupación no se gana solo con soldados. Detrás de cada guarnición hay una red de ejecutores — hombres entrenados no para el campo de batalla, sino para la esquina de la calle, el punto de control, el golpe de medianoche en la puerta. A medida que nuestro control sobre los ocupados se estrecha, también lo hace su eficiencia. Aprenden la tierra, aprenden a la gente, y se aseguran de que cualquier resistencia que quede nunca encuentre su lugar."
	
	pfp_military_police_idea_3:0 "Policía Militar"
	pfp_military_police_idea_3_desc:0 "La ocupación no se gana solo con soldados. Detrás de cada guarnición hay una red de ejecutores — hombres entrenados no para el campo de batalla, sino para la esquina de la calle, el punto de control, el golpe de medianoche en la puerta. A medida que nuestro control sobre los ocupados se estrecha, también lo hace su eficiencia. Aprenden la tierra, aprenden a la gente, y se aseguran de que cualquier resistencia que quede nunca encuentre su lugar."

	pfp_civilian_collaborators_idea_1:0 "Colaboradores Civiles"
	pfp_civilian_collaborators_idea_1_desc:0 "No toda la resistencia a la ocupación proviene de soldados y partisanos. Gran parte vive en personas ordinarias — vecinos que miran hacia otro lado, comerciantes que transmiten mensajes, familias que albergan a los huéspedes equivocados. Pero la gente puede ser convertida. A través del incentivo, del miedo, de la lenta erosión de las viejas lealtades, algunos entre los ocupados comienzan a servir al ocupante. Observan. Informan. Y con cada mes que pasa, el fuego de la resistencia encuentra menos lugares donde respirar."

	pfp_civilian_collaborators_idea_2:0 "Colaboradores Civiles"
	pfp_civilian_collaborators_idea_2_desc:0 "No toda la resistencia a la ocupación proviene de soldados y partisanos. Gran parte vive en personas ordinarias — vecinos que miran hacia otro lado, comerciantes que transmiten mensajes, familias que albergan a los huéspedes equivocados. Pero la gente puede ser convertida. A través del incentivo, del miedo, de la lenta erosión de las viejas lealtades, algunos entre los ocupados comienzan a servir al ocupante. Observan. Informan. Y con cada mes que pasa, el fuego de la resistencia encuentra menos lugares donde respirar."

	pfp_civilian_collaborators_idea_3:0 "Colaboradores Civiles"
	pfp_civilian_collaborators_idea_3_desc:0 "No toda la resistencia a la ocupación proviene de soldados y partisanos. Gran parte vive en personas ordinarias — vecinos que miran hacia otro lado, comerciantes que transmiten mensajes, familias que albergan a los huéspedes equivocados. Pero la gente puede ser convertida. A través del incentivo, del miedo, de la lenta erosión de las viejas lealtades, algunos entre los ocupados comienzan a servir al ocupante. Observan. Informan. Y con cada mes que pasa, el fuego de la resistencia encuentra menos lugares donde respirar."

	pfp_puppet_integration:0 "Integrar a los Ocupados"
	pfp_puppet_integration_desc:0 "La ocupación ha durado lo suficiente como para que ciertos territorios ya no se sientan extranjeros. La gente ha sido pacificada, las viejas costumbres olvidadas, y la maquinaria del estado funciona en nuestro nombre. Es hora de dejar de tratar estas tierras como territorio conquistado y empezar a tratarlas como lo que realmente son — nuestras."

	pfp_puppet_assistance:0 "Marionetas Formables de Pipe — Asistencia a las Marionetas"
	pfp_puppet_assistance_desc:0 "Un estado títere es tan fuerte como la mano que lo sostiene. Sin apoyo, incluso el régimen más dócil cederá bajo el peso de su propia población ocupada. No lo permitiremos. A través del flujo constante de mano de obra y material, nos aseguramos de que nuestra inversión en este territorio permanezca protegida — y que el costo de la resistencia sea demasiado alto para que alguien lo considere seriamente."

	pfp_deploy_reinforcements:0 "Desplegar Refuerzos en [FROM.GetName]"
	pfp_deploy_reinforcements_desc:0 "Los territorios ocupados están inquietos, y nuestra guarnición está estirada. Un nuevo despliegue de tropas reforzará nuestra presencia sobre el terreno, recordando a la población que nuestro alcance es largo y nuestra paciencia para el desorden es corta. Cada soldado enviado es otro clavo en el ataúd de la resistencia organizada."

	pfp_ship_arms_to_garrison:0 "Enviar Armas a la Guarnición de [FROM.GetName]"
	pfp_ship_arms_to_garrison_desc:0 "Una guarnición sin equipo adecuado es poco más que una presencia uniformada. Nos aseguraremos de que nuestras fuerzas en los territorios ocupados estén correctamente armadas — no solo para luchar, sino para recordar a cada calle y cada aldea exactamente quién tiene el poder aquí. Los soldados bien abastecidos no negocian. Ejecutan."
