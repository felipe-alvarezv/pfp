	pfp_category:0 "Pipe's Formable Puppets"
	pfp_category_desc:0 "A medida que ganamos más territorio, administrarlo todo se ha convertido en un problema complicado. Para solucionar esto, deben establecerse gobiernos títeres leales a nuestra nación en las regiones que hemos conquistado. Esto nos permitirá centrar nuestra atención en otro lugar, mientras la región apoya nuestra causa."

	pfp_puppet_management:0 "Pipe's Formable Puppets - Gestión"
	pfp_puppet_management_desc:0 "Tras establecer nuestra ocupación militar, es posible que necesitemos realizar ajustes en la administración y sus territorios."
