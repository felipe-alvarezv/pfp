l_english:
	pfp_category:0 "Pipe's Formable Puppets"
	pfp_category_desc:0 "As we gain more territory, it has become a complicated problem to administer all of it. To address this problem, puppet governments loyal to our nation should be established in the regions we have conquered. This will allow us to place our attention elsewhere, while the region helps our cause."

	pfp_puppet_management:0 "Pipe's Formable Puppets - Management"
	pfp_puppet_management_desc:0 "After establishing our military occupation, we may need to make adjustments regarding the administration and its territories.\n\n§YUse Overlord Color:§! [pfp_use_overlord_color_status]\n§YResistance Mechanics:§! [pfp_resistance_mechanics_status]"
