	pfp_management_window:0 "Open Management Menu"
	pfp_management_use_overlord_color:0 "Toggle Use Overlord Color"
	pfp_management_use_overlord_color_tooltip:0 "All player controlled countries are at peace."

	pfp_management_resistance:0 "Toggle Resistance Mechanics"
	pfp_management_resistance_desc:0 "This decision enables or disables the resistance mechanics. If enabled, formable puppets will not get cores and will have to complete focuses and decisions to raise compliance and lower resistance. A state will be cored once compliance is above 80% and resistance is below 20%."

	pfp_management_puppet_core_state:0 "Core Pacified States"
	pfp_management_puppet_core_state_desc:0 "This decision will add cores to all pacified states for the current formable puppet."
	pfp_management_puppet_core_state_trigger_tooltip:0 "[pfp_puppet_core_resistance_status]"
	pfp_puppet_core_status_resistance_enabled:0 "All of the following must be true:\n      Fully controls any possible core.\n      Any possible core is not core of §Y[ROOT.GetName]§!.\n      Any possible core has more than 80% compliance.\n      Any possible core has less than 20% resistance."
	pfp_puppet_core_status_resistance_disabled:0 "All of the following must be true:\n      Fully controls any possible core.\n      Any possible core is not core of §Y[ROOT.GetName]§!."
	pfp_management_puppet_core_state_effect_tooltip:0 "Any possible core meeting the previous requirements will be cored."

